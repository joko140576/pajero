<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Data Spreadsheet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f5132, #198754, #20c997);
    color: white;
}

.table-container {
    background: white;
    color: black;
    border-radius: 12px;
    padding: 20px;
}

.loader {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-4">📊 Data Peserta Pajero 2026 </h2>

    <div class="table-container shadow">

        <div id="loading" class="loader">
            <div class="spinner-border text-success"></div>
            <p>Loading data...</p>
        </div>

        <table class="table table-striped d-none" id="dataTable">
            <thead class="table-success">
                <tr id="tableHead"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

    </div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbwo7yXO3ylXrQtbF9A5JpsYCw7iMoar3CKae0OV4W_jjLHqC0_b_n6jE-lrIOruF8o11g/exec"; 

async function loadData() {
    try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.length === 0) return;

        const headers = Object.keys(data[0]);
        const headRow = document.getElementById("tableHead");
        const body = document.getElementById("tableBody");

        // header
        headers.forEach(h => {
            let th = document.createElement("th");
            th.innerText = h;
            headRow.appendChild(th);
        });

        // isi data
        data.forEach(row => {
            let tr = document.createElement("tr");

            headers.forEach(h => {
                let td = document.createElement("td");
                td.innerText = row[h];
                tr.appendChild(td);
            });

            body.appendChild(tr);
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("dataTable").classList.remove("d-none");

    } catch (err) {
        document.getElementById("loading").innerHTML = "❌ Gagal load data";
        console.error(err);
    }
}

loadData();
</script>

</body>
</html>
