
<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes rowIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes barGrow{from{width:0}to{width:100%}}

*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0f5132,#198754,#20c997);min-height:100vh;color:#fff;font-family:var(--font-sans)}

.page{padding:2rem 1rem;animation:fadeUp .5s ease both}

.hero{text-align:center;margin-bottom:2rem;animation:fadeUp .4s ease both}
.hero-icon{width:52px;height:52px;background:#fff1;border-radius:16px;border:.5px solid #fff3;display:inline-flex;align-items:center;justify-content:center;margin-bottom:.75rem}
.hero-icon svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.6}
.hero h1{font-size:22px;font-weight:500;color:#fff;letter-spacing:-.3px}
.hero p{font-size:13px;color:#ffffffaa;margin-top:4px}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:#fff1;border:.5px solid #fff2;border-radius:var(--border-radius-lg);padding:.75rem 1rem;text-align:center;animation:fadeUp .5s ease both}
.stat-card:nth-child(2){animation-delay:.05s}
.stat-card:nth-child(3){animation-delay:.1s}
.stat-val{font-size:22px;font-weight:500;color:#fff;display:block}
.stat-lbl{font-size:11px;color:#ffffffaa;margin-top:2px;display:block}

.toolbar{display:flex;gap:10px;margin-bottom:1rem;align-items:center}
.search-wrap{position:relative;flex:1}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:#888;fill:none;stroke-width:1.7;pointer-events:none}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;font-size:13px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;transition:border-color .2s,box-shadow .2s}
.search-wrap input:focus{border-color:#27500A;box-shadow:0 0 0 3px rgba(39,80,10,.12)}

.card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);overflow:hidden;animation:fadeUp .5s .15s ease both}

.table-scroll{overflow-x:auto}

table{width:100%;border-collapse:collapse;font-size:13px}

thead tr{background:#EAF3DE;border-bottom:1px solid #C0DD97}
th{padding:11px 14px;text-align:left;font-weight:500;font-size:12px;color:#27500A;white-space:nowrap;cursor:pointer;user-select:none;transition:background .15s}
th:hover{background:#C0DD97}
.sort-icon{display:inline-block;margin-left:4px;font-size:10px;opacity:.5;font-style:normal}

td{padding:10px 14px;color:var(--color-text-primary);border-bottom:.5px solid var(--color-border-tertiary);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
tbody tr{transition:background .15s;animation:rowIn .3s ease both}
tbody tr:hover{background:var(--color-background-secondary)}
tbody tr:last-child td{border-bottom:none}
tbody tr:nth-child(even){background:rgba(99,153,34,.04)}
tbody tr:nth-child(even):hover{background:var(--color-background-secondary)}

.empty-row td{text-align:center;padding:3rem;color:var(--color-text-secondary);font-size:14px}

.loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3.5rem 1rem;gap:1rem}
.spinner{width:36px;height:36px;border:3px solid #C0DD97;border-top-color:#3B6D11;border-radius:50%;animation:spin .75s linear infinite}
.loader-txt{font-size:14px;color:var(--color-text-secondary);animation:pulse 1.6s ease infinite}

.err-box{display:flex;align-items:center;gap:10px;padding:1rem 1.25rem;background:#FCEBEB;border-radius:var(--border-radius-md);border:.5px solid #F7C1C1;color:#791F1F;font-size:14px;margin:1rem 0}
.err-box svg{flex-shrink:0}

.footer-bar{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem .25rem;flex-wrap:wrap;gap:8px}
.footer-txt{font-size:12px;color:var(--color-text-secondary)}

.live-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;background:#EAF3DE;color:#27500A;border:.5px solid #C0DD97}
.live-dot{width:7px;height:7px;border-radius:50%;background:#639922;animation:pulse 1.8s ease infinite;flex-shrink:0}

.accent-bar{height:3px;background:linear-gradient(90deg,#3B6D11,#97C459);border-radius:0 0 0 0;animation:barGrow .8s .3s ease both}
</style>

<div class="page">

  <div class="hero">
    <div class="hero-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    </div>
    <h1>Data Peserta Pajero 2026</h1>
    <p id="hero-sub">Menghubungkan ke sumber data...</p>
  </div>

  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-card"><span class="stat-val" id="s-total">—</span><span class="stat-lbl">Total peserta</span></div>
    <div class="stat-card"><span class="stat-val" id="s-cols">—</span><span class="stat-lbl">Kolom data</span></div>
    <div class="stat-card"><span class="stat-val" id="s-show">—</span><span class="stat-lbl">Ditampilkan</span></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <div class="search-wrap">
      <svg viewBox="0 0 20 20"><circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/></svg>
      <input type="text" id="searchInput" placeholder="Cari peserta...">
    </div>
    <div class="live-badge"><span class="live-dot"></span><span id="badge-count">0</span></div>
  </div>

  <div class="card" id="mainCard">
    <div class="accent-bar"></div>
    <div class="loader-wrap" id="loading">
      <div class="spinner"></div>
      <span class="loader-txt">Loading data...</span>
    </div>
    <div class="err-box" id="errBox" style="display:none">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="10" cy="10" r="8"/><path d="M10 6v4M10 14h.01"/></svg>
      <span id="errMsg">Gagal load data</span>
    </div>
    <div class="table-scroll" id="tableWrap" style="display:none">
      <table id="dataTable">
        <thead><tr id="tableHead"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="footer-bar" id="footerBar" style="display:none">
      <span class="footer-txt" id="footerInfo">—</span>
      <span class="footer-txt" id="footerTime">—</span>
    </div>
  </div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbwo7yXO3ylXrQtbF9A5JpsYCw7iMoar3CKae0OV4W_jjLHqC0_b_n6jE-lrIOruF8o11g/exec";

let allData = [], headers = [], sortCol = null, sortDir = 1;

async function loadData() {
    try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.length === 0) return;

        allData = data;
        headers = Object.keys(data[0]);

        const headRow = document.getElementById("tableHead");
        headers.forEach((h, i) => {
            let th = document.createElement("th");
            th.innerHTML = h + ' <i class="sort-icon" id="si'+i+'">⇅</i>';
            th.onclick = () => doSort(i);
            headRow.appendChild(th);
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("tableWrap").style.display = "block";
        document.getElementById("stats-row").style.display = "grid";
        document.getElementById("toolbar").style.display = "flex";
        document.getElementById("footerBar").style.display = "flex";
        document.getElementById("s-cols").textContent = headers.length;
        document.getElementById("hero-sub").textContent = "Data berhasil dimuat";

        const now = new Date();
        document.getElementById("footerTime").textContent = "Diperbarui " + now.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

        renderRows(data);

        document.getElementById("searchInput").addEventListener("input", e => {
            const q = e.target.value.toLowerCase();
            const filtered = allData.filter(row => headers.some(h => String(row[h]??"").toLowerCase().includes(q)));
            renderRows(filtered);
        });

    } catch (err) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("errBox").style.display = "flex";
        document.getElementById("errMsg").textContent = "❌ Gagal load data";
        document.getElementById("hero-sub").textContent = "Koneksi gagal";
        console.error(err);
    }
}

function renderRows(data) {
    const body = document.getElementById("tableBody");
    body.innerHTML = "";
    document.getElementById("s-total").textContent = allData.length;
    document.getElementById("s-show").textContent = data.length;
    document.getElementById("badge-count").textContent = allData.length + " peserta";
    document.getElementById("footerInfo").textContent = "Menampilkan " + data.length + " dari " + allData.length + " baris";

    if (data.length === 0) {
        const tr = document.createElement("tr");
        tr.className = "empty-row";
        const td = document.createElement("td");
        td.colSpan = headers.length;
        td.textContent = "Tidak ada data yang cocok.";
        tr.appendChild(td);
        body.appendChild(tr);
        return;
    }

    data.forEach((row, idx) => {
        let tr = document.createElement("tr");
        tr.style.animationDelay = Math.min(idx * 0.03, 0.5) + "s";
        headers.forEach(h => {
            let td = document.createElement("td");
            td.innerText = row[h] ?? "—";
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });
}

function doSort(i) {
    if (sortCol === i) sortDir *= -1; else { sortCol = i; sortDir = 1; }
    const h = headers[i];
    allData.sort((a,b) => {
        const av = a[h]??"", bv = b[h]??"";
        const isNum = v => !isNaN(parseFloat(v)) && isFinite(v);
        if (isNum(av) && isNum(bv)) return (parseFloat(av)-parseFloat(bv))*sortDir;
        return String(av).localeCompare(String(bv))*sortDir;
    });
    document.querySelectorAll(".sort-icon").forEach((el,j) => {
        el.textContent = j===i ? (sortDir===1?"↑":"↓") : "⇅";
        el.style.opacity = j===i ? "1" : "0.5";
    });
    const q = document.getElementById("searchInput").value.toLowerCase();
    const filtered = q ? allData.filter(row => headers.some(h2 => String(row[h2]??"").toLowerCase().includes(q))) : allData;
    renderRows(filtered);
}

loadData();
</script>
