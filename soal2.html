<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Pelatihan PT SSI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- BOOTSTRAP 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to bottom right, #fff8e6, #f6e7c5);
    font-family: 'Segoe UI', sans-serif;
}
.mainbox { max-width: 1200px; margin:auto; }
.card { border-radius:16px; border:none; }
.card-header {
    background:#d4af37;
    color:#fff;
    font-weight:600;
}
.hidden{display:none}
.soal-box{
    background:#fff;
    padding:18px;
    border-radius:12px;
    border:1px solid #e3d7ac;
    margin-bottom:15px;
}
#loadingOverlay{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* TIMER */
#timerBox{
    position:sticky;
    top:0;
    z-index:999;
    background:#dc3545;
    color:#fff;
    padding:10px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingOverlay">
    <div class="text-center">
        <div class="spinner-border"></div>
        <p class="mt-3 fw-bold">Mengambil soal...</p>
    </div>
</div>

<div class="container mainbox py-5">

    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark">
            <i class="bi bi-airplane-fill me-2"></i>
            PAJERO 2026
        </h3>
        <h5 class="text-muted">
            SOAL SEPUTAR ALQURAN 
        </h5>
    </div>

    <!-- FORM -->
    <div id="formPeserta" class="card shadow-lg">
        <div class="card-header bg-success text-white">Data Peserta</div>
        <div class="card-body p-4">

            <!-- NAMA -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-person-fill me-1 text-success"></i>
                    Nama Pegawai
                </label>
                <input id="nama" class="form-control" placeholder="Nama Pegawai">
            </div>

            <!-- NPP -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-credit-card-2-front-fill me-1 text-success"></i>
                    NPP
                </label>
                <input id="npp" class="form-control" placeholder="NPP">
            </div>

            <!-- REGION -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-geo-alt-fill me-1 text-success"></i>
                    Region
                </label>
                <select id="region" class="form-select">
                    <option value="">-- Pilih Region --</option>
                    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
                    <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
                </select>
            </div>

            <!-- UNIT -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-building-fill me-1 text-success"></i>
                    Unit
                </label>
                <input id="unit" class="form-control" placeholder="Unit (contoh: TWU Bekasi)">
            </div>

            <!-- JABATAN -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    <i class="bi bi-briefcase-fill me-1 text-success"></i>
                    Jabatan
                </label>
                <select id="jabatan" class="form-select">
                    <option value="">-- Jabatan --</option>
                    <option>GM</option>
                    <option>Ceo Region</option>
                    <option>Deputy</option>
                    <option>Senior Manager</option>
                    <option>Manager</option>
                    <option>Asisten Manager</option>
                    <option>Staf</option>
                </select>
            </div>

            <button class="btn btn-danger w-100" onclick="mulaiPostTest()">
                Mulai Post Test
            </button>

        </div>
    </div>

    <!-- TIMER -->
    <div id="timerBox" class="hidden">
        ⏳ Sisa Waktu: <span id="timer">02:00</span>
    </div>

    <!-- KUIS -->
    <div id="kuisBox" class="hidden mt-4">
        <div class="card shadow">
            <div class="card-header bg-dark">Post Test</div>
            <div class="card-body">
                <div id="listSoal"></div>
                <button class="btn btn-danger w-100" onclick="kumpulkan()">Kumpulkan Jawaban</button>
            </div>
        </div>
    </div>

    <!-- HASIL -->
    <div id="hasilBox" class="hidden mt-4 card shadow p-4 text-center">
        <h4 id="tampilNilai"></h4>
    </div>

</div>

<!-- LOGIN MODAL -->
<div class="modal fade" id="loginModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5>Login Akses Test</h5>
      </div>
      <div class="modal-body">
        <input id="userLogin" class="form-control mb-2" placeholder="Username">
        <input id="passLogin" type="password" class="form-control" placeholder="Password">
        <div id="loginError" class="text-danger mt-2 hidden">Login salah</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary w-100" onclick="cekLogin()">Masuk</button>
      </div>
    </div>
  </div>
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const WEBAPP = "https://script.google.com/macros/s/AKfycbz8E91IZo6JwMcKLZ6d01Uu6J-rZzXDfX7BQNe6g7noIK7qX1v7NU-gxMBXQtWar-S2/exec";

const formPeserta = document.getElementById("formPeserta");
const kuisBox = document.getElementById("kuisBox");
const hasilBox = document.getElementById("hasilBox");
const tampilNilai = document.getElementById("tampilNilai");
const listSoal = document.getElementById("listSoal");
const loadingOverlay = document.getElementById("loadingOverlay");

let DATA_SOAL = [];
let USER = {};
let waktu = 120;
let interval;

// ================= MULAI =================
function mulaiPostTest(){
    USER.nama = nama.value;
    USER.npp = npp.value;
    USER.region = region.value;
    USER.unit = unit.value;
    USER.jabatan = jabatan.value;
    

    if(!USER.nama || !USER.npp){
        alert("Nama & NPP wajib diisi");
        return;
    }

    new bootstrap.Modal(document.getElementById('loginModal')).show();
}

// ================= LOGIN =================
function cekLogin(){
    if(userLogin.value==="pajero2 && passLogin.value==="alquran"){
        bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
        mulaiSoal();
    }else{
        loginError.classList.remove("hidden");
    }
}

// ================= LOAD SOAL (GAS) =================
async function mulaiSoal(){

    fetch(WEBAPP+"?action=simpandata",{method:"POST",body:JSON.stringify(USER)});

    formPeserta.classList.add("hidden");
    loadingOverlay.style.display="flex";

    const res = await fetch(WEBAPP+"?action=getsoal");
    DATA_SOAL = await res.json();

    let html="";
    DATA_SOAL.forEach((s,i)=>{
        html+=`
        <div class="soal-box">
            <b>${i+1}. ${s.soal}</b><br><br>
            ${["A","B","C","D"].map(p=>`
                <label class="d-block">
                <input type="radio" name="soal${i}" value="${p}">
                ${p}. ${s["opsi"+p]}
                </label>
            `).join("")}
        </div>`;
    });

    listSoal.innerHTML = html;
    loadingOverlay.style.display="none";
    kuisBox.classList.remove("hidden");

    startTimer();
}

// ================= TIMER =================
function startTimer(){
    document.getElementById("timerBox").classList.remove("hidden");

    interval = setInterval(()=>{
        waktu--;

        let m = Math.floor(waktu/60);
        let d = waktu%60;

        timer.innerText =
            String(m).padStart(2,'0') + ":" + String(d).padStart(2,'0');

        if(waktu<=0){
            clearInterval(interval);
            waktuHabis();
        }

    },1000);
}

// ================= WAKTU HABIS =================
function waktuHabis(){
    hitungNilai(true);
}

// ================= KUMPUL =================
function kumpulkan(){
    clearInterval(interval);
    hitungNilai(false);
}

// ================= HITUNG =================
function hitungNilai(isTimeout){

    let benar=0;

    DATA_SOAL.forEach((s,i)=>{
        const j=document.querySelector(`input[name=soal${i}]:checked`);
        if(j && j.value===s.kunci) benar++;
    });

    USER.nilai = Math.round((benar/DATA_SOAL.length)*100);

    fetch(WEBAPP+"?action=simpannilai",{method:"POST",body:JSON.stringify(USER)});

    kuisBox.classList.add("hidden");
    hasilBox.classList.remove("hidden");

    tampilNilai.innerHTML = `
        ${isTimeout ? "<h4 class='text-danger'>⛔ Waktu Habis!</h4>" : ""}
        Nilai Anda: <b>${USER.nilai}</b><br>
        Terimakasih atas partisipasinya
    `;
}


// ================= DETEKSI PINDAH TAB =================
let curangCount = 0;

document.addEventListener("visibilitychange", function () {

    // hanya aktif saat kuis sedang berjalan
    if (document.hidden && kuisBox.classList.contains("hidden") === false) {

        curangCount++;

        console.log("Terdeteksi pindah tab! Ke:", curangCount);

        // kirim ke GAS
        fetch(WEBAPP + "?action=curang", {
            method: "POST",
            body: JSON.stringify(USER)
        });

        // OPSIONAL: tampilkan warning ke user
        alert("⚠️ Dilarang pindah tab! Aktivitas Anda tercatat.");
    }
});
</script>

</body>
</html>
